<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Loyola CS Digital Assistant{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        panel: "#0f172a",
                        accent: "#38bdf8",
                        accent2: "#8b5cf6",
                        surface: "#111827"
                    },
                    boxShadow: {
                        glass: "0 20px 80px rgba(15, 23, 42, 0.35)"
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <div class="pointer-events-none fixed inset-0 overflow-hidden">
        <div class="absolute -left-24 top-0 h-72 w-72 rounded-full bg-cyan-500/20 blur-3xl"></div>
        <div class="absolute right-0 top-24 h-96 w-96 rounded-full bg-fuchsia-500/15 blur-3xl"></div>
        <div class="absolute bottom-0 left-1/3 h-80 w-80 rounded-full bg-sky-500/10 blur-3xl"></div>
    </div>

    <div class="relative z-10">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mx-auto max-w-7xl px-6 pt-6">
                    {% for category, message in messages %}
                        <div class="mb-3 rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-sm shadow-glass backdrop-blur-xl {% if category == 'error' %}text-rose-200{% else %}text-emerald-200{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block body %}{% endblock %}
    </div>
</body>
</html>
